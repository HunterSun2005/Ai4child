  pca:
    enabled: false
    n_components: 32
    fit_on: non_test      # choices: non_test / labeled / all
    frames_per_clip: 32   # sampled frames per clip when fitting PCA

model:
  model_type: EfficientGCN-B0
  model_args:
    stem_channel: 64
    block_args: [[48, 1, 0.5], [24, 1, 0.5], [64, 2, 1], [128, 2, 1]]
    fusion_stage: 2
    act_type: swish
    att_type: stja
    layer_type: Sep
    drop_prob: 0.25
    kernel_size: [5, 2]
    scale_args: [1.2, 1.35]
    expand_ratio: 2
    reduct_ratio: 4
    bias: true
    edge: true

train:
  seed: 42
  batch_size: 16
  num_workers: 4
  epochs: 30
  lr: 0.001
  weight_decay: 0.0001
  grad_clip: 5.0

  lambda_ssl: 0.2
  lambda_t1: 1.0
  lambda_t2: 2.0
  ssl_temperature: 0.2
  ssl_proj_dim: 128

  jitter_std: 0.01
  temporal_crop_min: 0.75

competition:
  track1_test_ids: [4, 5, 18, 26, 28, 40, 42, 43, 47, 48, 53, 54, 72, 78, 83, 85]
  track2_test_ids: [4, 6, 7, 13, 26, 35, 39, 42, 50]
  track2_label_order: [type1, type2, type3, type4, WNL]
  track1_threshold: 0.5
