paths:
  dataset_root: ./dataset
  track1_label: ./train/track1_train.json
  track2_label: ./train/track2_train.json
  submission_template: ./submissions/submission_template.csv

  work_dir: ./workdir/aichild_track12
  cache_dir: ./workdir/cache
  manifest_path: ./workdir/aichild_track12/manifest.csv
  pca_model_path: ./workdir/aichild_track12/pca_joint_model.npz
  prediction_path: ./workdir/aichild_track12/predictions_multitask.json
  submission_output: ./submissions/submission_track12.csv

data:
  num_frame: 256
  inputs: JVB
  root_joint: 11
  score_thr: 0.1
  score:
    enabled: false
    clip_min: 0.0
    clip_max: 1.0
    power: 1.0
    only_above_thr: true
