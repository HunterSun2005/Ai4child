  pca:
    enabled: true
    n_components: 48
    fit_on: non_test      # choices: non_test / labeled / all
    frames_per_clip: 48   # sampled frames per clip when fitting PCA

model:
  model_type: EfficientGCN-B0
  model_args:
    stem_channel: 64
    block_args: [[48, 1, 0.5], [24, 1, 0.5], [64, 2, 1], [128, 2, 1]]
    fusion_stage: 2
    act_type: swish
    att_type: stja
    layer_type: Sep
    drop_prob: 0.25
    kernel_size: [5, 2]
    scale_args: [1.2, 1.35]
    expand_ratio: 2
    reduct_ratio: 4
    bias: true
    edge: true

train:
  seed: 42
  cv_folds: 3
  batch_size: 16
  num_workers: 4
  epochs: 30
  lr: 0.001
  weight_decay: 0.0001
  grad_clip: 5.0

  lambda_ssl: 0.2
  lambda_t1: 1.0
  lambda_t2: 2.0
  ssl_temperature: 0.2
  ssl_proj_dim: 128

  jitter_std: 0.01
  temporal_crop_min: 0.75
  use_track2_weighted_sampler: true
  track2_sampler_default_weight: 1.0
  track2_sampler_unlabeled_weight: 0.8
  # class index -> sampler weight (type1..WNL = 0..4)
  track2_class_weights:
    "0": 1.2
    "1": 1.1
    "2": 1.0
    "3": 2.5
    "4": 2.8
  augment:
    # 1) Temporal augmentation
    enable_time_aug: true
    temporal_shift_max: 10
    speed_min: 0.85
    speed_max: 1.15
    # 2) Spatial augmentation
    enable_spatial_aug: true
    rotate_deg: 8.0
    translate_std: 0.015
    scale_min: 0.92
    scale_max: 1.08
    # 3) Confidence augmentation
    enable_conf_aug: true
    conf_noise_std: 0.02
    conf_drop_prob: 0.08
    conf_low_boost: 0.25
    # 4) Left-right flip augmentation (with label/direction swap)
    enable_lr_flip: true
    flip_prob: 0.30
    # 5) Rare-class augmentation strength (type4/WNL by default)
    enable_rare_aug: true
    rare_track2_indices: [3, 4]
    rare_strength: 1.5

predict:
  folds: all
  task: both
  checkpoint_policy: separate
  ensemble_topk: 0

competition:
  track1_test_ids: [4, 5, 18, 26, 28, 40, 42, 43, 47, 48, 53, 54, 72, 78, 83, 85]
  track2_test_ids: [4, 6, 7, 13, 26, 35, 39, 42, 50]
  track2_label_order: [type1, type2, type3, type4, WNL]
  track1_threshold: 0.5
